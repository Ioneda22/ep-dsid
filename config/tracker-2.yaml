# config/tracker-2.yaml — §6.6 do CLAUDE.md
# Execução local: todos os nós em 127.0.0.1; cada tracker usa um par de
# portas distinto (api_port e sync_port). Paths relativos à raiz do projeto.
tracker_id: tracker-2
ip: 127.0.0.1
api_port: 8002          # FastAPI (REST com peers)
sync_port: 9002         # TCP (sincronização)
is_bootstrap: false     # apenas tracker-1 é bootstrap
known_trackers:
  - { tracker_id: tracker-1, ip: 127.0.0.1, sync_port: 9001 }
  - { tracker_id: tracker-3, ip: 127.0.0.1, sync_port: 9003 }
db_path: data/tracker-2/peerspot.db
log_path: logs/tracker-2.log
log_level: INFO

# Constantes operacionais
seed_report_timeout_seconds: 360       # 6 min = 2 rodadas perdidas
tombstone_retention_seconds: 600       # 10 min
sync_outbound_timeout_seconds: 3
search_forward_timeout_seconds: 2
digest_interval_seconds: 300           # 5 min; SYNC_DIGEST entre trackers (< retenção do tombstone, 600s)